<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalEntropía</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

header{
    background:linear-gradient(90deg,#6a0dad,#a020f0);
    padding:30px;
}

h1{
    margin:0;
    font-size:42px;
}

p{
    font-size:18px;
}

.card{
    max-width:700px;
    margin:40px auto;
    background:#222;
    border-radius:20px;
    padding:25px;
}

button{
    background:#8a2be2;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    background:#b44cff;
}
</style>

</head>

<body>

<header>
<h1>🦖 PalEntropía</h1>
<p>Repositorio Oficial de Paleofichas</p>
</header>

<div class="card">

<h2>Gastornis</h2>

<p>La primera Paleoficha del repositorio.</p>

<button>Ver Paleoficha</button>

</div>

</body>
</html>
